spring:
  application:
    name: ecommerce-gas
  datasource:
    url: jdbc:h2:file:./data/gassolutions;AUTO_RECONNECT=TRUE;DB_CLOSE_ON_EXIT=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: GasSolutionsBogota2026SecretKeyForJWTTokenGeneration
    expiration: 86400000

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
